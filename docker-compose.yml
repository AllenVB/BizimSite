services:
  # 1. Veritabanı (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: bizimsite-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bizimsite
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s
    networks:
      - bizimsite-network

  # 2. Backend (ASP.NET Core)
  backend:
    build: .
    container_name: bizimsite-api
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__DefaultConnection=Server=35.246.220.89;Port=5432;Database=bizimsite;User Id=postgres;Password=7355608Ks.;SSL Mode=Require;Trust Server Certificate=true;
      - ASPNETCORE_ENVIRONMENT=Docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bizimsite-network

  # 3. Frontend (React)
  frontend:
    build: ./ClientApp
    container_name: bizimsite-web
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - bizimsite-network

networks:
  bizimsite-network:
    driver: bridge

volumes:
  postgres_data:
